# SSL config for koushik510.store
# 1. Install certbot: sudo apt install certbot python3-certbot-nginx
# 2. Run: sudo certbot --nginx -d koushik510.store -d www.koushik510.store
# 3. Certbot will auto-modify this. Or replace this file with the certbot-generated config.

server {
    listen 80;
    server_name koushik510.store www.koushik510.store;
    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name koushik510.store www.koushik510.store;

    # Certbot will add these; placeholder for manual setup:
    # ssl_certificate /etc/letsencrypt/live/koushik510.store/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/koushik510.store/privkey.pem;

    # Frontend (React build)
    root /opt/strategy-screener/frontend/build;
    index index.html;

    # API proxy
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location ~ ^/(strategies|run|indicators|ohlc|chart|sectors|patterns|financials|conditions|admin)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
