name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /opt/strategy-screener
            sudo -u screener git pull origin main
            cd /opt/data-store
            sudo -u screener git pull origin main

            echo "=== Installing Python deps ==="
            cd /opt/strategy-screener
            sudo -u screener /opt/strategy-screener/venv/bin/pip install -q -r requirements.txt

            echo "=== Running DB migrations ==="
            PGPASSWORD=market_pass psql -h localhost -U market_user -d market -f /opt/data-store/schema.sql 2>/dev/null || true
            PGPASSWORD=market_pass psql -h localhost -U market_user -d market -f /opt/data-store/ohlc.sql 2>/dev/null || true
            PGPASSWORD=market_pass psql -h localhost -U market_user -d market -f /opt/data-store/enrich_symbols.sql 2>/dev/null || true
            PGPASSWORD=market_pass psql -h localhost -U market_user -d market -f /opt/data-store/financials_schema.sql 2>/dev/null || true
            PGPASSWORD=market_pass psql -h localhost -U market_user -d market -f /opt/data-store/commodity_schema.sql 2>/dev/null || true

            echo "=== Building frontend ==="
            cd /opt/strategy-screener/frontend
            sudo -u screener bash -c 'export PATH=/usr/local/bin:$PATH && npm ci --silent 2>/dev/null || npm install --silent && REACT_APP_API_URL="" npm run build'

            echo "=== Updating systemd service ==="
            sudo cp /opt/strategy-screener/deploy/screener-backend.service /etc/systemd/system/screener-backend.service
            sudo systemctl daemon-reload

            echo "=== Restarting backend ==="
            sudo systemctl restart screener-backend

            echo "=== Reloading nginx ==="
            sudo cp /opt/strategy-screener/deploy/nginx-screener.conf /etc/nginx/sites-available/screener
            sudo nginx -t && sudo systemctl reload nginx

            echo "=== Deploy complete ==="
